name: Build Manager

on:
  workflow_dispatch:
  push:
    branches: [ "main", "dev", "ci" ]
    paths:
      - '.github/workflows/build-manager.yml'
      - '.github/workflows/build-lkm.yml'
      - '.github/workflows/ddk-lkm.yml'
      - '.github/workflows/ksud.yml'
      - 'manager/**'
      - 'kernel/**'
      - 'userspace/**'
      - 'scripts/ksubot.py'
  pull_request:
  workflow_call:

jobs:
  notify-cicd-start:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Send CI/CD start notification
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          THREAD_ID: ${{ secrets.MESSAGE_CICD_THREAD_ID }}
        run: |
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -n 1)
          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG=$(echo '${{ toJSON(github.event.commits) }}' | python3 -c "import sys,json; commits=json.load(sys.stdin); print(commits[-1]['message'].split(chr(10))[0] if commits else '(no commit message)')" 2>/dev/null || echo "(no commit message)")
          fi
          COMMIT_MSG=$(echo "$COMMIT_MSG" | head -c 200)
          BRANCH="${{ github.ref_name }}"
          SENDER="${{ github.actor }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MSG="<b>🏗 CI/CD - Build Started</b>%0A%0A<b>Repo:</b> ${REPO}%0A<b>Branch:</b> ${BRANCH}%0A<b>Commit:</b> ${COMMIT_MSG}%0A<b>Author:</b> ${SENDER}%0A%0A<a href=\"${RUN_URL}\">View Workflow Run</a>"

          THREAD_PARAM=""
          if [ -n "$THREAD_ID" ]; then
            THREAD_PARAM="&message_thread_id=${THREAD_ID}"
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&parse_mode=HTML&disable_web_page_preview=true&text=${MSG}${THREAD_PARAM}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "[+] CI/CD start notification sent"
          else
            echo "[-] Failed to send CI/CD start notification (HTTP $HTTP_CODE)"
            echo "$RESPONSE" | head -n-1
          fi

  generate-key:
    runs-on: ubuntu-latest
    outputs:
      expected_size: ${{ steps.extract.outputs.expected_size }}
      expected_hash: ${{ steps.extract.outputs.expected_hash }}
      keystore: ${{ steps.gen.outputs.keystore }}
      keystore_password: ${{ steps.gen.outputs.keystore_password }}
      key_password: ${{ steps.gen.outputs.key_password }}
    steps:
      - name: Generate temporary keystore
        if: github.event_name == 'pull_request'
        id: gen
        run: |
          KEYSTORE_PASSWORD=$(openssl rand -hex 32)
          KEY_PASSWORD=$(openssl rand -hex 32)
          echo "keystore_password=$KEYSTORE_PASSWORD" >> $GITHUB_OUTPUT
          echo "key_password=$KEY_PASSWORD" >> $GITHUB_OUTPUT

          keytool -genkeypair \
            -alias pr-key \
            -keyalg RSA -keysize 2048 \
            -validity 1 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=KernelSU PR Build" \
            -storetype JKS \
            -keystore pr-key.jks

          echo "keystore=$(base64 -w 0 pr-key.jks)" >> $GITHUB_OUTPUT

      - name: Extract certificate hash and size
        if: github.event_name == 'pull_request'
        id: extract
        env:
          STORE_PASS: ${{ steps.gen.outputs.keystore_password }}
        run: |
          # Export DER certificate
          keytool -exportcert \
            -alias pr-key \
            -keystore pr-key.jks \
            -storepass "$STORE_PASS" \
            -file pr-cert.der

          # Calculate size in hex
          SIZE_DEC=$(stat -c%s pr-cert.der)
          SIZE_HEX=$(printf '0x%04x' "$SIZE_DEC")
          echo "expected_size=$SIZE_HEX" >> $GITHUB_OUTPUT

          # Calculate SHA256 hash
          HASH=$(sha256sum pr-cert.der | awk '{print $1}')
          echo "expected_hash=$HASH" >> $GITHUB_OUTPUT

          echo "Certificate size: $SIZE_HEX ($SIZE_DEC bytes)"
          echo "Certificate hash: $HASH"

  build-lkm:
    needs: generate-key
    uses: ./.github/workflows/build-lkm.yml
    with:
      expected_pr_build_size: ${{ needs.generate-key.outputs.expected_size || '' }}
      expected_pr_build_hash: ${{ needs.generate-key.outputs.expected_hash || '' }}
    secrets: inherit

  build-ksuinit:
    uses: ./.github/workflows/ksuinit.yml

  build-ksud:
    needs: [build-lkm, build-ksuinit]
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            os: ubuntu-latest
          - target: x86_64-linux-android
            os: ubuntu-latest
          - target: armv7-linux-androideabi
            os: ubuntu-latest
    uses: ./.github/workflows/ksud.yml
    with:
      target: ${{ matrix.target }}
      os: ${{ matrix.os }}

  build-manager:
    needs: [generate-key]
    runs-on: ubuntu-latest
    if: always() && needs.generate-key.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - manager_type: "spoofed"
            build_type: "release"

          - manager_type: "normal"
            build_type: "release"
          - manager_type: "normal"
            build_type: "debug"
    defaults:
      run:
        working-directory: ./manager

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine commit for build
        id: commit
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            echo "COMMIT_SHA=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine manager variant
        id: determine
        run: |
          if [ "${{ matrix.manager_type }}" == "spoofed" ]; then
            echo "title=Spoofed-Manager" >> $GITHUB_OUTPUT
          else
            echo "title=Manager" >> $GITHUB_OUTPUT
          fi

      - name: Run randomizer
        if: ${{ matrix.manager_type == 'spoofed' }}
        run: |
          chmod +x randomizer
          ./randomizer

      - name: Write key
        if: ${{ github.event_name == 'workflow_dispatch' || ( github.event_name != 'pull_request') || github.ref_type == 'tag' }}
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            {
              echo KEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}'
              echo KEY_ALIAS='${{ secrets.KEY_ALIAS }}'
              echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}'
              echo KEYSTORE_FILE='key.jks'
            } >> gradle.properties
            echo "${{ secrets.KEYSTORE }}" | base64 -d > key.jks
          fi

      - name: Write PR key
        if: github.event_name == 'pull_request'
        env:
          PR_KEYSTORE: ${{ needs.generate-key.outputs.keystore }}
          PR_KEYSTORE_PASSWORD: ${{ needs.generate-key.outputs.keystore_password }}
          PR_KEY_PASSWORD: ${{ needs.generate-key.outputs.key_password }}
        run: |
          echo "$PR_KEYSTORE" | base64 -d > pr-key.jks
          {
            echo KEYSTORE_PASSWORD="$PR_KEYSTORE_PASSWORD"
            echo KEY_ALIAS='pr-key'
            echo KEY_PASSWORD="$PR_KEY_PASSWORD"
            echo KEYSTORE_FILE='pr-key.jks'
          } >> gradle.properties
      
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Build APK
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            ./gradlew assemble${{ matrix.build_type }} -Pcommit=${{ steps.commit.outputs.COMMIT_SHA }} -PIS_PR_BUILD=true
          else
            ./gradlew assemble${{ matrix.build_type }} -Pcommit=${{ steps.commit.outputs.COMMIT_SHA }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.determine.outputs.title }}-gradle-${{ matrix.build_type }}
          path: |
            manager/app/build/outputs/apk/release/*.apk
            manager/app/build/outputs/apk/debug/*.apk

      - name: Upload mappings
        uses: actions/upload-artifact@v7
        with:
          name: "${{ steps.determine.outputs.title }}-mappings"
          path: "manager/app/build/outputs/mapping/release/"
          if-no-files-found: ignore

  repack-manager:
    if: always() && needs.build-manager.result == 'success' && needs.build-ksud.result == 'success'
    needs: [build-manager, build-ksud, generate-key]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - manager_type: "spoofed"
            build_type: "release"
          - manager_type: "normal"
            build_type: "release"
          - manager_type: "normal"
            build_type: "debug"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine manager variant
        id: determine
        run: |
          if [ "${{ matrix.manager_type }}" == "spoofed" ]; then
            echo "title=Spoofed-Manager" >> $GITHUB_OUTPUT
          else
            echo "title=Manager" >> $GITHUB_OUTPUT
          fi

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
            name: ${{ steps.determine.outputs.title }}-gradle-${{ matrix.build_type }}
            path: artifacts/${{ steps.determine.outputs.title }}-gradle-${{ matrix.build_type }}
      
      - name: Download arm64 ksud
        uses: actions/download-artifact@v8
        with:
          name: ksud-aarch64-linux-android
          path: artifacts/ksud-aarch64-linux-android

      - name: Download x86_64 ksud
        uses: actions/download-artifact@v8
        with:
          name: ksud-x86_64-linux-android
          path: artifacts/ksud-x86_64-linux-android

      - name: Download arm ksud
        uses: actions/download-artifact@v8
        with:
          name: ksud-armv7-linux-androideabi
          path: artifacts/ksud-armv7-linux-androideabi

      - name: Place manager apk and ksud artifacts
        run: |
          mkdir -p manager/app/build/outputs/apk/${{ matrix.build_type }}
          APKS=$(find artifacts/${{ steps.determine.outputs.title }}-gradle-${{ matrix.build_type }} -type f -name "*.apk")
          APKS=$(echo "$APKS" | tr '\n' ' ')
          test -n "$APKS"
          cp -f $APKS manager/app/build/outputs/apk/${{ matrix.build_type }}/

          mkdir -p target/aarch64-linux-android/release
          mkdir -p target/armv7-linux-androideabi/release
          mkdir -p target/x86_64-linux-android/release
          ARM64_KSUD=$(find artifacts/ksud-aarch64-linux-android -type f -name ksud | head -n 1)
          ARMV7_KSUD=$(find artifacts/ksud-armv7-linux-androideabi -type f -name ksud | head -n 1)
          X86_64_KSUD=$(find artifacts/ksud-x86_64-linux-android -type f -name ksud | head -n 1)
          test -n "$ARM64_KSUD"
          test -n "$ARMV7_KSUD"
          test -n "$X86_64_KSUD"
          cp -f "$ARM64_KSUD" target/aarch64-linux-android/release/ksud
          cp -f "$ARMV7_KSUD" target/armv7-linux-androideabi/release/ksud
          cp -f "$X86_64_KSUD" target/x86_64-linux-android/release/ksud

      - name: Prepare signing inputs
        if: ${{ github.event_name == 'pull_request' || (github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/ci')) || github.ref_type == 'tag' }}
        env:
          PR_KEYSTORE: ${{ needs.generate-key.outputs.keystore }}
          PR_KEYSTORE_PASSWORD: ${{ needs.generate-key.outputs.keystore_password }}
          PR_KEY_PASSWORD: ${{ needs.generate-key.outputs.key_password }}
          PROD_KEYSTORE: ${{ secrets.KEYSTORE }}
          PROD_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          PROD_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          PROD_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "$PR_KEYSTORE" | base64 -d > pr-key.jks
            echo "SIGN_KEYSTORE_FILE=pr-key.jks" >> $GITHUB_ENV
            echo "SIGN_KEY_ALIAS=pr-key" >> $GITHUB_ENV
            echo "SIGN_KEYSTORE_PASSWORD=$PR_KEYSTORE_PASSWORD" >> $GITHUB_ENV
            echo "SIGN_KEY_PASSWORD=$PR_KEY_PASSWORD" >> $GITHUB_ENV
          else
            test -n "$PROD_KEYSTORE"
            echo "$PROD_KEYSTORE" | base64 -d > key.jks
            echo "SIGN_KEYSTORE_FILE=key.jks" >> $GITHUB_ENV
            echo "SIGN_KEY_ALIAS=$PROD_KEY_ALIAS" >> $GITHUB_ENV
            echo "SIGN_KEYSTORE_PASSWORD=$PROD_KEYSTORE_PASSWORD" >> $GITHUB_ENV
            echo "SIGN_KEY_PASSWORD=$PROD_KEY_PASSWORD" >> $GITHUB_ENV
          fi

      - name: Repack and resign
        if: ${{ github.event_name == 'pull_request' || (github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/ci')) || github.ref_type == 'tag' }}
        run: |
          python3 repack_apk_multi.py repack \
            -b ${{ matrix.build_type }} \
            -t release \
            -a arm64-v8a \
            -a armeabi-v7a \
            -a x86_64 \
            -K "$SIGN_KEYSTORE_FILE" \
            -A "$SIGN_KEY_ALIAS" \
            -P "$SIGN_KEYSTORE_PASSWORD" \
            -S "$SIGN_KEY_PASSWORD" \
            --strip

      - name: Delete gradle build
        uses: GeekyEggo/delete-artifact@v6
        with:
          name: ${{ steps.determine.outputs.title }}-gradle-${{ matrix.build_type }}
        
      - name: Upload build artifact
        if: ${{ github.event_name == 'pull_request' || (github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/ci')) || github.ref_type == 'tag' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.determine.outputs.title }}-${{ matrix.build_type }}
          path: dist/*.apk

  upload-telegram:
    needs: repack-manager
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        manager_type: [ "spoofed", "normal" ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup need_upload
        id: need_upload
        run: |
          if [ ! -z "${{ secrets.BOT_TOKEN }}" ]; then
            echo "UPLOAD=true" >> $GITHUB_OUTPUT
          else
            echo "UPLOAD=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine manager variant
        id: determine
        run: |
          if [ "${{ matrix.manager_type }}" == "spoofed" ]; then
            echo "title=Spoofed-Manager" >> $GITHUB_OUTPUT
            echo "topicid=${{ secrets.MESSAGE_SPOOFED_THREAD_ID }}" >> $GITHUB_OUTPUT
          else
            echo "title=Manager" >> $GITHUB_OUTPUT
            echo "topicid=${{ secrets.MESSAGE_THREAD_ID }}" >> $GITHUB_OUTPUT
          fi

      - name: Download Debug artifact
        if: ${{ matrix.manager_type != 'spoofed' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ steps.determine.outputs.title }}-debug
          path: ./apk/debug

      - name: Download Release artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ steps.determine.outputs.title }}-release
          path: ./apk/release

      - name: Upload to Telegram
        if: steps.need_upload.outputs.UPLOAD == 'true'
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MESSAGE_THREAD_ID: ${{ steps.determine.outputs.topicid }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TITLE: ${{ steps.determine.outputs.title }}
          BRANCH: ${{ github.ref_name }}
        run: |
          pip3 install python-telegram-bot
          export VERSION=$(git rev-list --count HEAD)
          if [ "${{ matrix.manager_type }}" != "spoofed" ]; then
            APK_DEBUG=apk/debug/*.apk
          else
            APK_DEBUG=""
          fi
          APK_RELEASE=apk/release/*.apk
          python3 $GITHUB_WORKSPACE/scripts/ksubot.py $APK_DEBUG $APK_RELEASE

  notify-cicd-end:
    if: always() && github.event_name == 'push'
    needs: [repack-manager, build-ksud, build-manager, generate-key, build-lkm, build-ksuinit]
    runs-on: ubuntu-latest
    steps:
      - name: Send CI/CD completion notification
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          THREAD_ID: ${{ secrets.MESSAGE_CICD_THREAD_ID }}
        run: |
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -n 1)
          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG=$(echo '${{ toJSON(github.event.commits) }}' | python3 -c "import sys,json; commits=json.load(sys.stdin); print(commits[-1]['message'].split(chr(10))[0] if commits else '(no commit message)')" 2>/dev/null || echo "(no commit message)")
          fi
          COMMIT_MSG=$(echo "$COMMIT_MSG" | head -c 200)
          BRANCH="${{ github.ref_name }}"
          SENDER="${{ github.actor }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          REPACK="${{ needs.repack-manager.result }}"
          KSUD="${{ needs.build-ksud.result }}"
          MANAGER="${{ needs.build-manager.result }}"
          LKM="${{ needs.build-lkm.result }}"
          KSUINIT="${{ needs.build-ksuinit.result }}"

          if [ "$REPACK" = "success" ] && [ "$KSUD" = "success" ] && [ "$MANAGER" = "success" ] && [ "$LKM" = "success" ] && [ "$KSUINIT" = "success" ]; then
            STATUS="✅ <b>SUCCESS</b>"
          else
            STATUS="❌ <b>FAILED</b>"
            FAILED_JOBS=""
            [ "$REPACK" != "success" ] && FAILED_JOBS="${FAILED_JOBS}  - repack-manager: ${REPACK}%0A"
            [ "$KSUD" != "success" ] && FAILED_JOBS="${FAILED_JOBS}  - build-ksud: ${KSUD}%0A"
            [ "$MANAGER" != "success" ] && FAILED_JOBS="${FAILED_JOBS}  - build-manager: ${MANAGER}%0A"
            [ "$LKM" != "success" ] && FAILED_JOBS="${FAILED_JOBS}  - build-lkm: ${LKM}%0A"
            [ "$KSUINIT" != "success" ] && FAILED_JOBS="${FAILED_JOBS}  - build-ksuinit: ${KSUINIT}%0A"
          fi

          if [ -n "$FAILED_JOBS" ]; then
            MSG="<b>CI/CD - Build Completed</b>%0A%0A<b>Status:</b> ${STATUS}%0A<b>Repo:</b> ${REPO}%0A<b>Branch:</b> ${BRANCH}%0A<b>Commit:</b> ${COMMIT_MSG}%0A<b>Author:</b> ${SENDER}%0A%0A<b>Failed Jobs:</b>%0A${FAILED_JOBS}%0A<a href=\"${RUN_URL}\">View Workflow Run</a>"
          else
            MSG="<b>CI/CD - Build Completed</b>%0A%0A<b>Status:</b> ${STATUS}%0A<b>Repo:</b> ${REPO}%0A<b>Branch:</b> ${BRANCH}%0A<b>Commit:</b> ${COMMIT_MSG}%0A<b>Author:</b> ${SENDER}%0A%0A<a href=\"${RUN_URL}\">View Workflow Run</a>"
          fi

          THREAD_PARAM=""
          if [ -n "$THREAD_ID" ]; then
            THREAD_PARAM="&message_thread_id=${THREAD_ID}"
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&parse_mode=HTML&disable_web_page_preview=true&text=${MSG}${THREAD_PARAM}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "[+] CI/CD completion notification sent"
          else
            echo "[-] Failed to send CI/CD completion notification (HTTP $HTTP_CODE)"
            echo "$RESPONSE" | head -n-1
          fi
